name: blckswan speedrun forge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    env:
      DEVICE: lamu
      TARGET: lineage_lamu-userdebug
      BRANCH: lineage-21.0

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y repo git openjdk-17-jdk ccache zip unzip lz4 bc

      - name: Setup cache
        run: |
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=25G" >> $GITHUB_ENV
          echo "CCACHE_EXEC=/usr/bin/ccache" >> $GITHUB_ENV

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: speedrun-${{ runner.os }}-${{ env.BRANCH }}-${{ env.DEVICE }}
          restore-keys: |
            speedrun-${{ runner.os }}-${{ env.BRANCH }}-

      - name: Sync (turbo)
        run: |
          mkdir -p aosp/.repo/local_manifests
          cp local_manifests/lamu.xml aosp/.repo/local_manifests/

          cd aosp
          repo init -u https://github.com/LineageOS/android.git -b $BRANCH --depth=1
          repo sync -c -j$(nproc) --optimized-fetch --no-tags --no-clone-bundle

      - name: ⚡ Preflight check (fail fast)
        run: |
          cd aosp
          test -d device/motorola/lamu || (echo "❌ Missing device tree" && exit 1)
          test -d vendor/motorola || (echo "❌ Missing vendor" && exit 1)

      - name: ⚡ Build SYSTEM ONLY (speed test)
        run: |
          cd aosp
          source build/envsetup.sh
          lunch $TARGET
          make systemimage -j$(nproc)

      - name: ⚡ If system OK → full build
        run: |
          cd aosp
          make -j$(nproc)

      - name: Package
        run: |
          mkdir release
          find aosp/out/target/product -name "*.zip" -exec cp {} release/ \; || true
          cd release
          zip -9 speedrun-build.zip . || true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: speedrun-${{ github.run_number }}
          name: speedrun build #${{ github.run_number }}
          files: release/speedrun-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
