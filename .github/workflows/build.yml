name: AOSP Automagic Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup deps
        run: |
          sudo apt update
          sudo apt install -y repo git openjdk-17-jdk ccache lz4 zip unzip

      - name: Enable ccache turbo
        run: |
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV

      - name: Sync (shallow speedrun)
        run: |
          mkdir aosp && cd aosp
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r1 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Build (all cores go brr)
        run: |
          cd aosp
          source build/envsetup.sh
          lunch aosp_arm64-eng
          make -j$(nproc)

      - name: Package
        run: |
          cd aosp/out/target/product/* || true
          zip -r build.zip . || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aosp-build
          path: aosp/out/target/product/**
