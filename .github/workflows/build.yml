name: Moto G15 Power GSI Forge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    env:
      AOSP_BRANCH: android-14.0.0_r1
      TARGET: aosp_arm64_ab-userdebug

    steps:
      - name: Setup
        run: |
          sudo apt update
          sudo apt install -y repo git openjdk-17-jdk ccache zip unzip lz4

      - name: Enable ccache
        run: |
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=20G" >> $GITHUB_ENV

      - name: Sync AOSP
        run: |
          mkdir aosp && cd aosp
          repo init -u https://android.googlesource.com/platform/manifest -b $AOSP_BRANCH --depth=1
          repo sync -c -j$(nproc)

      - name: Build GSI
        run: |
          cd aosp
          source build/envsetup.sh
          lunch $TARGET
          make -j$(nproc) systemimage

      - name: Package
        run: |
          mkdir release
          find aosp/out/target/product -name "system.img" -exec cp {} release/ \;

          cd release
          zip -9 gsi-moto-g15.zip system.img

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: moto-g15-${{ github.run_number }}
          name: Moto G15 GSI Build
          files: release/gsi-moto-g15.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
