name: AOSP + NetHunter Hybrid Forge
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup deps
        run: |
          sudo apt update
          sudo apt install -y repo git openjdk-17-jdk ccache wget zip unzip

      - name: Enable ccache
        run: |
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV

      - name: Sync AOSP
        run: |
          mkdir aosp && cd aosp
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r1 --depth=1
          repo sync -c -j$(nproc)

      - name: Build ROM
        run: |
          cd aosp
          source build/envsetup.sh
          lunch aosp_arm64-eng
          make -j$(nproc)

      - name: Fetch NetHunter (rootless)
        run: |
          mkdir nethunter && cd nethunter
          wget -q https://offs.ec/2MceZWr -O install-nethunter.sh || true
          chmod +x install-nethunter.sh

      - name: Package combo
        run: |
          mkdir release
          cp -r aosp/out/target/product/* release/ || true
          cp -r nethunter release/nethunter || true
          cd release
          zip -r aosp-nethunter-bundle.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aosp-nh-$(date +%s)
          name: AOSP + NetHunter Bundle
          files: release/aosp-nethunter-bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
